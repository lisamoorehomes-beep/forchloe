<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Chloe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fff0f3;
            --text-color: #5c3d42;
            --accent-color: #ff85a1;
            --opened-color: #ffb3c1;
            --button-text: #ffffff;
            --tracker-color: #ba9499;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 182, 193, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 133, 161, 0.2) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
        }

        /* Romantic Welcome Header */
        .welcome-header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .welcome-subtitle {
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--tracker-color);
        }

        /* Stats Tracker Countdown */
        .tracker {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--tracker-color);
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Advent Calendar Grid Layout */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
        }

        .day-card {
            background-color: var(--accent-color);
            color: var(--button-text);
            aspect-ratio: 1;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 133, 161, 0.2);
            transition: transform 0.2s ease, background-color 0.3s ease, box-shadow 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .day-card:active {
            transform: scale(0.93);
        }

        /* State for an opened calendar day */
        .day-card.opened {
            background-color: var(--opened-color);
            box-shadow: none;
        }

        .day-card.active-card {
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(255, 133, 161, 0.6);
            border: 2px solid #fff;
        }

        /* Display Box for the Messages */
        .message-box {
            min-height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 24px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .message-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.45rem;
            line-height: 1.5;
            color: var(--text-color);
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .message-text.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        /* Layout modifications for smaller devices */
        @media (max-width: 400px) {
            .welcome-title {
                font-size: 1.75rem;
            }
            .calendar-grid {
                gap: 8px;
            }
            .day-card {
                font-size: 1rem;
                border-radius: 8px;
            }
            .message-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="welcome-header">
            <h1 class="welcome-title">I love you, Chloe!</h1>
            <p class="welcome-subtitle">Open the advent calendar below to receive your love messages.</p>
        </div>

        <div class="tracker" id="tracker">0 / 10 Opened • 10 Left</div>

        <div class="calendar-grid" id="calendarGrid"></div>
        
        <div class="message-box">
            <p id="message" class="message-text">Pick a day to uncover your love note...</p>
        </div>
    </div>

    <script>
        // Exact revised user messages mapped sequentially to Days 1-10
        const messages = [
            "You are doing so well, Chloe. Take a deep breath and give yourself credit for all that you've faced with strength and with your big beautiful heart.",
            "Just a reminder for you today, Chloe: you are incredibly loved, valued and capable of achieving amazing things.",
            "Your kindness and warmth make the world a much brighter place, Chloe. Never forget the impact you have. Bless the world with your presence!",
            "Chloe, I hope you know that you are everything to me! I think about every moment, I am with you when its tough and I know we will coninue to make eachother happier forever",
            "Pack your bags! we are going to Italy! Soon... I just need to buy you that ring first",
            "I am so proud to see you grow Chloe, keep on waking up and trying your best because I promise it is working, just wait til you see it!",
            "Being with you is all I can ever ask for. No matter the circumstance, I am fulfilled by being by your side. My heart is filled by you",
            "Your big beautiful eyes deserve to see the beautiful things in life! Go look at the mirror... no but seriously you are truly perfect. Go see what you want to see and do what you want to do, no one can stop you!",
            "You are reading this right now and I know we are both thinking the same thing - wouldn't a couple blizzards and some nice giggles be perfect right now?",
            "We are so close Chloe! We are almost at happy ever after... I can feel ittttttttt.. AHHHHHHHH Chloe and Sam! Chloe and Sam! SO closeeee"
        ];

        const openedDays = new Set();
        const gridEl = document.getElementById('calendarGrid');
        const messageEl = document.getElementById('message');
        const trackerEl = document.getElementById('tracker');

        function buildCalendar() {
            for (let i = 1; i <= 10; i++) {
                const card = document.createElement('button');
                card.classList.add('day-card');
                card.textContent = i;
                card.setAttribute('data-index', i - 1);
                
                card.addEventListener('click', (e) => handleCardClick(e.currentTarget, i - 1));
                gridEl.appendChild(card);
            }
        }

        function handleCardClick(cardElement, index) {
            document.querySelectorAll('.day-card').forEach(btn => btn.classList.remove('active-card'));
            
            cardElement.classList.add('opened', 'active-card');
            openedDays.add(index);
            
            updateTracker();

            messageEl.classList.remove('fade-in');
            setTimeout(() => {
                messageEl.textContent = messages[index];
                messageEl.classList.add('fade-in');
            }, 150);
        }

        function updateTracker() {
            const openedCount = openedDays.size;
            const leftCount = messages.length - openedCount;
            trackerEl.textContent = `${openedCount} / 10 Opened • ${leftCount} Left`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            buildCalendar();
            messageEl.classList.add('fade-in');
        });
    </script>
</body>
</html>
